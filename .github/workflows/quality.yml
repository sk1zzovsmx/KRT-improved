name: Quality Checks

on:
    pull_request:
    push:
        branches:
            - "**"

permissions:
    contents: read

jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository (no external action)
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  rm -rf repo
                  git init repo
                  cd repo
                  git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

                  ref="${GITHUB_SHA}"
                  if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
                      ref="${GITHUB_REF}"
                  fi

                  git fetch --depth 1 origin "${ref}"
                  git checkout --detach FETCH_HEAD

            - name: Install Lua quality tooling
              shell: bash
              run: |
                  set -euo pipefail

                  sudo apt-get update
                  sudo apt-get install -y lua5.1 luarocks ripgrep
                  sudo luarocks install luacheck 0.23.0-1
                  cargo install stylua --version 2.3.1 --locked

                  pwsh --version
                  lua5.1 -v
                  luacheck --version
                  stylua --version

            - name: Run repository quality checks
              shell: bash
              working-directory: repo
              run: |
                  set -euo pipefail

                  python3 tools/krt.py repo-quality-check --check all

            - name: Run StyLua check
              shell: bash
              working-directory: repo
              run: |
                  set -euo pipefail

                  stylua --check !KRT tools tests

            - name: Check API catalogs
              shell: bash
              working-directory: repo
              run: |
                  set -euo pipefail

                  python3 tools/krt.py api-catalog-check

            - name: Run targeted stabilization tests
              shell: bash
              working-directory: repo
              run: |
                  set -euo pipefail

                  python3 tools/krt.py run-release-targeted-tests --runtime lua5.1

            - name: Run SavedVariables fixture round-trip
              shell: bash
              working-directory: repo
              run: |
                  set -euo pipefail

                  python3 tools/krt.py run-sv-roundtrip --fixtures --runtime lua5.1

            - name: Validate release metadata
              shell: bash
              working-directory: repo
              run: |
                  set -euo pipefail

                  python3 tools/krt.py release-metadata --json
