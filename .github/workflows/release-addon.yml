name: Release Addon Package

on:
    push:
        tags:
            - "beta-*"
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Release tag (example: beta-0.6.0b)"
                required: true
                type: string
            target_ref:
                description: "Branch or commit to package"
                required: false
                default: ""
                type: string
            prerelease:
                description: "Mark release as prerelease"
                required: false
                default: true
                type: boolean

permissions:
    contents: write

jobs:
    package-and-release:
        runs-on: ubuntu-latest
        steps:
            - name: Resolve release metadata
              id: meta
              shell: bash
              run: |
                  set -euo pipefail

                  if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
                      tag="${{ inputs.tag_name }}"
                      ref="${{ inputs.target_ref }}"
                      if [[ -z "${ref}" ]]; then
                          ref="${GITHUB_REF_NAME}"
                      fi
                      prerelease="${{ inputs.prerelease }}"
                  else
                      tag="${GITHUB_REF_NAME}"
                      ref="${GITHUB_SHA}"
                      if [[ "${GITHUB_REF_NAME}" == beta-* ]]; then
                          prerelease="true"
                      else
                          prerelease="false"
                      fi
                  fi

                  echo "tag=${tag}" >> "$GITHUB_OUTPUT"
                  echo "ref=${ref}" >> "$GITHUB_OUTPUT"
                  echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

            - name: Checkout repository (no external action)
              shell: bash
              env:
                  REF: ${{ steps.meta.outputs.ref }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  rm -rf repo
                  git init repo
                  cd repo
                  git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git fetch --depth 1 origin "${REF}"
                  git checkout --detach FETCH_HEAD

            - name: Build addon archive (only !KRT/)
              id: pack
              shell: pwsh
              env:
                  TAG: ${{ steps.meta.outputs.tag }}
              run: |
                  $asset = "KRT-$env:TAG.zip"
                  & ./repo/tools/build-release-zip.ps1 -OutputDir "../dist" -FileName $asset -WriteChecksum
                  echo "asset_name=${asset}" >> "$GITHUB_OUTPUT"
                  echo "asset_path=dist/${asset}" >> "$GITHUB_OUTPUT"
                  echo "checksum_path=dist/${asset}.sha256" >> "$GITHUB_OUTPUT"

            - name: Create/update release and upload asset
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ steps.meta.outputs.tag }}
                  REF: ${{ steps.meta.outputs.ref }}
                  PRERELEASE: ${{ steps.meta.outputs.prerelease }}
                  ASSET_PATH: ${{ steps.pack.outputs.asset_path }}
                  CHECKSUM_PATH: ${{ steps.pack.outputs.checksum_path }}
              run: |
                  set -euo pipefail

                  if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
                      gh release upload "${TAG}" "${ASSET_PATH}" "${CHECKSUM_PATH}" \
                          --repo "${GITHUB_REPOSITORY}" \
                          --clobber

                      release_id="$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json id --jq '.id')"
                      gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
                          -F "prerelease=${PRERELEASE}" >/dev/null
                  else
                      release_args=(
                          release create "${TAG}" "${ASSET_PATH}" "${CHECKSUM_PATH}"
                          --repo "${GITHUB_REPOSITORY}"
                          --title "${TAG}"
                          --target "${REF}"
                          --generate-notes
                          --verify-tag
                      )

                      if [[ "${PRERELEASE}" == "true" ]]; then
                          release_args+=(--prerelease)
                      fi

                      gh "${release_args[@]}"
                  fi
