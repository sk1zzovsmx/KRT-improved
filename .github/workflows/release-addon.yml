name: Release Addon Publish (Reusable)

on:
    workflow_call:
        inputs:
            expected_channel:
                description: "Expected release channel from CHANGELOG Release-Version SemVer"
                required: true
                type: string
            requested_ref:
                description: "Ref used to resolve metadata before switching to the derived tag"
                required: true
                type: string
            requested_tag:
                description: "Optional pushed tag to validate against derived release metadata"
                required: false
                default: ""
                type: string

permissions:
    contents: write

jobs:
    package-and-release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository (no external action)
              shell: bash
              env:
                  REF: ${{ inputs.requested_ref }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  rm -rf repo
                  git init repo
                  cd repo
                  git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git fetch --depth 1 origin "${REF}"
                  git checkout --detach FETCH_HEAD

            - name: Resolve release metadata from changelog
              id: meta
              shell: bash
              env:
                  EXPECTED_CHANNEL: ${{ inputs.expected_channel }}
              run: |
                  set -euo pipefail

                  python3 ./repo/tools/krt.py release-metadata \
                      --expected-channel "${EXPECTED_CHANNEL}" \
                      --github-output "$GITHUB_OUTPUT"

            - name: Validate pushed tag matches derived release metadata
              if: ${{ inputs.requested_tag != '' }}
              shell: bash
              env:
                  REQUESTED_TAG: ${{ inputs.requested_tag }}
                  DERIVED_TAG: ${{ steps.meta.outputs.tag }}
              run: |
                  set -euo pipefail

                  if [[ "${REQUESTED_TAG}" != "${DERIVED_TAG}" ]]; then
                      echo "Pushed tag '${REQUESTED_TAG}' does not match derived tag '${DERIVED_TAG}'." >&2
                      exit 1
                  fi

            - name: Fetch and switch to derived release tag
              shell: bash
              env:
                  DERIVED_TAG: ${{ steps.meta.outputs.tag }}
              run: |
                  set -euo pipefail

                  if ! git -C repo fetch --depth 1 origin "refs/tags/${DERIVED_TAG}:refs/tags/${DERIVED_TAG}"; then
                      echo "Expected release tag not found on origin: ${DERIVED_TAG}" >&2
                      exit 1
                  fi

                  git -C repo fetch --tags --force origin
                  git -C repo checkout --detach "refs/tags/${DERIVED_TAG}"

            - name: Prepare release artifacts
              id: prep
              shell: bash
              env:
                  EXPECTED_CHANNEL: ${{ inputs.expected_channel }}
                  DERIVED_TAG: ${{ steps.meta.outputs.tag }}
              run: |
                  set -euo pipefail

                  python3 ./repo/tools/krt.py release-prepare \
                      --expected-channel "${EXPECTED_CHANNEL}" \
                      --current-tag "${DERIVED_TAG}" \
                      --current-ref HEAD \
                      --output-dir ../dist \
                      --github-output "$GITHUB_OUTPUT"

            - name: Create GitHub release
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ steps.meta.outputs.tag }}
                  PRERELEASE: ${{ steps.meta.outputs.prerelease }}
                  RELEASE_TITLE: ${{ steps.meta.outputs.release_title }}
                  ASSET_PATH: ${{ steps.prep.outputs.asset_path }}
                  CHECKSUM_PATH: ${{ steps.prep.outputs.checksum_path }}
                  NOTES_PATH: ${{ steps.prep.outputs.notes_path }}
              run: |
                  set -euo pipefail

                  assets=("${ASSET_PATH}")
                  if [[ -f "${CHECKSUM_PATH}" ]]; then
                      assets+=("${CHECKSUM_PATH}")
                  else
                      echo "Checksum asset not found: ${CHECKSUM_PATH}"
                      echo "Continuing with ZIP only."
                  fi

                  if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
                      existing_assets="$(gh release view "${TAG}" \
                          --repo "${GITHUB_REPOSITORY}" \
                          --json assets \
                          --jq '.assets[].name')"
                      missing_assets=()
                      for asset in "${assets[@]}"; do
                          asset_name="$(basename "${asset}")"
                          if ! grep -Fxq "${asset_name}" <<< "${existing_assets}"; then
                              missing_assets+=("${asset_name}")
                          fi
                      done

                      if [[ ${#missing_assets[@]} -eq 0 ]]; then
                          echo "Release ${TAG} already exists with the expected assets."
                          exit 0
                      fi

                      echo "Release ${TAG} already exists but is missing expected assets: ${missing_assets[*]}." >&2
                      echo "SemVer releases are immutable. Publish a new version instead of replacing assets." >&2
                      exit 1
                  fi

                  release_args=(
                      release create "${TAG}" "${assets[@]}"
                      --repo "${GITHUB_REPOSITORY}"
                      --title "${RELEASE_TITLE}"
                      --notes-file "${NOTES_PATH}"
                      --verify-tag
                  )

                  if [[ "${PRERELEASE}" == "true" ]]; then
                      release_args+=(--prerelease)
                  fi

                  gh "${release_args[@]}"
