name: Release Addon Package

on:
    push:
        tags:
            - "beta-*"
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Release tag (example: beta-0.5.6c)"
                required: true
                type: string
            target_ref:
                description: "Branch or commit to package"
                required: false
                default: "splitting-monolithic-KRT"
                type: string
            prerelease:
                description: "Mark release as prerelease"
                required: false
                default: true
                type: boolean

permissions:
    contents: write

jobs:
    package-and-release:
        runs-on: ubuntu-latest
        steps:
            - name: Resolve release metadata
              id: meta
              shell: bash
              run: |
                  set -euo pipefail

                  if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
                      tag="${{ inputs.tag_name }}"
                      ref="${{ inputs.target_ref }}"
                      prerelease="${{ inputs.prerelease }}"
                  else
                      tag="${GITHUB_REF_NAME}"
                      ref="${GITHUB_REF_NAME}"
                      if [[ "${GITHUB_REF_NAME}" == beta-* ]]; then
                          prerelease="true"
                      else
                          prerelease="false"
                      fi
                  fi

                  echo "tag=${tag}" >> "$GITHUB_OUTPUT"
                  echo "ref=${ref}" >> "$GITHUB_OUTPUT"
                  echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

            - name: Checkout repository (no external action)
              shell: bash
              env:
                  REF: ${{ steps.meta.outputs.ref }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail

                  rm -rf repo
                  git init repo
                  cd repo
                  git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git fetch --depth 1 origin "${REF}"
                  git checkout --detach FETCH_HEAD

            - name: Build addon archive (only !KRT/)
              id: pack
              shell: bash
              env:
                  TAG: ${{ steps.meta.outputs.tag }}
              run: |
                  set -euo pipefail

                  asset="KRT-${TAG}.zip"
                  mkdir -p dist
                  rm -f "dist/${asset}"

                  rm -rf package
                  mkdir -p package
                  cp -R "repo/!KRT" package/

                  (
                      cd package
                      zip -r "../dist/${asset}" "!KRT"
                  )

                  python3 - "${asset}" <<'PY'
                  import sys
                  import zipfile

                  zip_path = "dist/" + sys.argv[1]
                  with zipfile.ZipFile(zip_path) as archive:
                      invalid = [name for name in archive.namelist() if name and not name.startswith("!KRT/")]

                  if invalid:
                      raise SystemExit(
                          "Archive validation failed. Unexpected entries: " + ", ".join(invalid[:5])
                      )

                  print("Archive validation OK.")
                  PY

                  echo "asset_name=${asset}" >> "$GITHUB_OUTPUT"
                  echo "asset_path=dist/${asset}" >> "$GITHUB_OUTPUT"

            - name: Create/update release and upload asset
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ steps.meta.outputs.tag }}
                  REF: ${{ steps.meta.outputs.ref }}
                  PRERELEASE: ${{ steps.meta.outputs.prerelease }}
                  ASSET_PATH: ${{ steps.pack.outputs.asset_path }}
              run: |
                  set -euo pipefail

                  if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
                      gh release upload "${TAG}" "${ASSET_PATH}" \
                          --repo "${GITHUB_REPOSITORY}" \
                          --clobber
                  else
                      release_args=(
                          release create "${TAG}" "${ASSET_PATH}"
                          --repo "${GITHUB_REPOSITORY}"
                          --title "${TAG}"
                          --target "${REF}"
                          --generate-notes
                          --verify-tag
                      )

                      if [[ "${PRERELEASE}" == "true" ]]; then
                          release_args+=(--prerelease)
                      fi

                      gh "${release_args[@]}"
                  fi
